# Training phases
train_encoder: true
train_decoder: true

# Model architecture
whisper_name: openai/whisper-large-v3
llm_name: Qwen/Qwen3-4B-Instruct-2507
adapter_hidden_dim: 2048
adapter_ds_rate: 5

decoder_hidden_dim: 4096
decoder_num_heads: 32
decoder_num_layers: 2
decoder_intermediate_dim: 11008
decoder_upsample_rate: 25

# Training - shared
batch_size: 4
gradient_accumulation_steps: 1
warmup_ratio: 0.05
gradient_clip: 1.0
val_ratio: 0.01
seed: 42
max_answer_tokens: 128

# Training - per phase
encoder_num_epochs: 10
encoder_learning_rate: 1e-4
decoder_num_epochs: 10
decoder_learning_rate: 1e-4

# Data
data_dir: /home/ubuntu/voice_lab/data/processed/training_dataset

# Checkpoints (set path to skip training that phase, or to resume)
adapter_checkpoint: null
adapter_resume: false
decoder_checkpoint: null
decoder_resume: false
checkpoint_bucket: null

# Multi-GPU / quantisation
use_device_map: false
load_in_8bit: false

# Prompt template
prompt_template: original.yaml

wandb_project: voice_lab
