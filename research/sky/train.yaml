resources:
  accelerators: H100:1
  use_spot: true
  disk_size: 256

file_mounts:
  /data:
    name: vedaangh-voice-lab-data
    source: ./data
    store: s3
    mode: MOUNT
  /checkpoints:
    name: vedaangh-voice-lab-checkpoints
    store: s3
    mode: MOUNT

setup: |
  cd ~/sky_workdir/research
  pip install -r ../requirements.txt
  wandb login $WANDB_API_KEY

run: |
  cd ~/sky_workdir/research
  python train.py data_dir=/data/processed/training_dataset \
    checkpoint_bucket=/checkpoints

envs:
  WANDB_API_KEY:
