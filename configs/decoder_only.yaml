# Decoder-only training using pre-trained adapter
# Created: 2025-12-23

# Training phases - only decoder
train_encoder: false
train_decoder: true

# Model architecture
whisper_name: openai/whisper-large-v3
llm_name: Qwen/Qwen3-4B-Instruct-2507
adapter_hidden_dim: 2048
adapter_ds_rate: 5

decoder_hidden_dim: 4096
decoder_num_heads: 32
decoder_num_layers: 2
decoder_intermediate_dim: 4096
decoder_upsample_rate: 25

# Training - shared
batch_size: 2
warmup_ratio: 0.03
gradient_clip: 1.0
val_ratio: 0.01
seed: 42
max_answer_tokens: 128

# Training - per phase
encoder_num_epochs: 3
encoder_learning_rate: 2e-5
decoder_num_epochs: 3
decoder_learning_rate: 2e-4

# Checkpoints - use most recent adapter
adapter_checkpoint: checkpoints/20251224_182316/encoder/best_adapter.pt
adapter_resume: false
decoder_checkpoint: null
decoder_resume: false

wandb_project: voice_lab

